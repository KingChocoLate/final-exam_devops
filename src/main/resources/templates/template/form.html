<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Template Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4" style="max-width:600px">
    <h2 th:text="${template.id != null} ? 'Edit Template' : 'New Template'"></h2>

    <form th:action="${template.id != null}
            ? @{/templates/{id}/update(id=${template.id})}
            : @{/templates}"
          method="post">

        <div class="mb-3">
            <label class="form-label">Code * (unique key)</label>
            <input type="text" name="code" class="form-control"
                   th:value="${template.code}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Name *</label>
            <input type="text" name="name" class="form-control"
                   th:value="${template.name}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Organization Name</label>
            <input type="text" name="organizationName" class="form-control"
                   th:value="${template.organizationName}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Tagline</label>
            <input type="text" name="tagline" class="form-control"
                   th:value="${template.tagline}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Layout</label>
            <select name="layout" class="form-select">
                <option value="VERTICAL" th:selected="${template.layout == 'VERTICAL'}">VERTICAL</option>
                <option value="HORIZONTAL" th:selected="${template.layout == 'HORIZONTAL'}">HORIZONTAL</option>
            </select>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Primary Color</label>
                <input type="color" name="primaryColor" class="form-control form-control-color"
                       th:value="${template.primaryColor}"/>
            </div>
            <div class="col mb-3">
                <label class="form-label">Secondary Color</label>
                <input type="color" name="secondaryColor" class="form-control form-control-color"
                       th:value="${template.secondaryColor}"/>
            </div>
            <div class="col mb-3">
                <label class="form-label">Text Color</label>
                <input type="color" name="textColor" class="form-control form-control-color"
                       th:value="${template.textColor}"/>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/templates}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
