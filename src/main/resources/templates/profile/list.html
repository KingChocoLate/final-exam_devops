<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ID Card Generator</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a th:href="@{/profiles}" class="navbar-brand">🪪 ID Card Generator</a>

    <div class="navbar-menu">
        <a th:href="@{/profiles}">Profiles</a>
        <a th:href="@{/profiles/new}">New Profile</a>
        <a th:href="@{/idcard/export/batch}">Batch Export</a>
        <a th:href="@{/templates}">Templates</a>
    </div>
</nav>

<main class="container">

    <section class="card page-header">
        <h1>Profiles</h1>
        <a th:href="@{/profiles/new}" class="btn btn-primary">+ New Profile</a>
    </section>

    <section class="card">
        <form th:action="@{/profiles}" method="get" class="filter-bar">
            <input type="text"
                   name="search"
                   placeholder="Search by name..."
                   class="form-control">

            <select name="type" class="form-control">
                <option value="">All Types</option>
                <option th:each="type : ${profileTypes}"
                        th:value="${type}"
                        th:text="${type}">
                </option>
            </select>

            <button type="submit" class="btn btn-primary">Filter</button>
        </form>

        <table class="table">
            <thead>
            <tr>
                <th>Reg. No.</th>
                <th>Name</th>
                <th>Type</th>
                <th>Department</th>
                <th>Template</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="profile : ${profiles}">
                <td th:text="${profile.registrationNumber}">2026-ENG-001</td>

                <td th:text="${profile.fullName}">Sophea Chan</td>

                <td>
                    <span class="badge"
                          th:classappend="${profile.type.name() == 'STUDENT'} ? ' badge-student' :
                                          (${profile.type.name() == 'EMPLOYEE'} ? ' badge-employee' : ' badge-user')"
                          th:text="${profile.type}">
                        STUDENT
                    </span>
                </td>

                <td th:text="${profile.department}">Engineering</td>

                <td th:text="${profile.template != null ? profile.template.name : 'No Template'}">
                    Classic Blue
                </td>

                <td>
                    <div class="actions">
                        <a th:href="@{/idcard/preview/{id}(id=${profile.id})}"
                           class="btn btn-outline">Card</a>

                        <a th:href="@{/profiles/{id}/edit(id=${profile.id})}"
                           class="btn btn-outline">Edit</a>

                        <a th:href="@{/idcard/export/pdf/{id}(id=${profile.id})}"
                           class="btn btn-small-primary">PDF</a>

                        <form th:action="@{/profiles/{id}/delete(id=${profile.id})}"
                              method="post"
                              style="display:inline;">
                            <button type="submit"
                                    class="btn btn-danger"
                                    onclick="return confirm('Delete this profile?')">
                                Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>

            <tr th:if="${profiles.isEmpty()}">
                <td colspan="6" class="empty-row">No profiles found.</td>
            </tr>
            </tbody>
        </table>
    </section>

</main>

</body>
</html>
