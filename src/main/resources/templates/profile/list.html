<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profiles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>ID Card Management</h2>
        <div>
            <a th:href="@{/idcard/export/batch}" class="btn btn-success me-2">Batch Export PDF</a>
            <a th:href="@{/templates}" class="btn btn-secondary me-2">Templates</a>
            <a th:href="@{/profiles/new}" class="btn btn-primary">+ New Profile</a>
        </div>
    </div>

    <form class="row g-2 mb-3" method="get">
        <div class="col-md-5">
            <input name="search" class="form-control" placeholder="Search by name..."
                   th:value="${param.search}"/>
        </div>
        <div class="col-md-3">
            <select name="type" class="form-select">
                <option value="">All Types</option>
                <option th:each="t : ${profileTypes}" th:value="${t}" th:text="${t}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-outline-secondary w-100">Filter</button>
        </div>
    </form>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>Photo</th>
            <th>Reg. Number</th>
            <th>Full Name</th>
            <th>Type</th>
            <th>Department</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${profiles}">
            <td>
                <img th:if="${p.hasPhoto()}"
                     th:src="@{/profiles/photo/{id}(id=${p.id})}"
                     width="40" height="40"
                     style="border-radius:50%;object-fit:cover"/>
                <span th:unless="${p.hasPhoto()}">—</span>
            </td>
            <td th:text="${p.registrationNumber}"></td>
            <td th:text="${p.fullName}"></td>
            <td><span class="badge bg-info text-dark" th:text="${p.type}"></span></td>
            <td th:text="${p.department}"></td>
            <td>
                <a th:href="@{/profiles/{id}(id=${p.id})}" class="btn btn-sm btn-info">View</a>
                <a th:href="@{/idcard/preview/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Preview</a>
                <a th:href="@{/idcard/export/pdf/{id}(id=${p.id})}" class="btn btn-sm btn-success">PDF</a>
                <a th:href="@{/profiles/{id}/edit(id=${p.id})}" class="btn btn-sm btn-secondary">Edit</a>
                <form th:action="@{/profiles/{id}/delete(id=${p.id})}" method="post" style="display:inline">
                    <button class="btn btn-sm btn-danger"
                            onclick="return confirm('Delete this profile?')">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
