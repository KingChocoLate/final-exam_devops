<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4" style="max-width:650px">
    <h2 th:text="${profile.id != null} ? 'Edit Profile' : 'New Profile'"></h2>

    <form th:action="${profile.id != null}
            ? @{/profiles/{id}/update(id=${profile.id})}
            : @{/profiles}"
          method="post" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Full Name *</label>
            <input type="text" name="fullName" class="form-control"
                   th:value="${profile.fullName}" required/>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" th:value="${profile.email}"/>
            </div>
            <div class="col mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" th:value="${profile.phone}"/>
            </div>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Department</label>
                <input type="text" name="department" class="form-control" th:value="${profile.department}"/>
            </div>
            <div class="col mb-3">
                <label class="form-label">Title / Position</label>
                <input type="text" name="title" class="form-control" th:value="${profile.title}"/>
            </div>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Blood Group</label>
                <input type="text" name="bloodGroup" class="form-control" th:value="${profile.bloodGroup}"/>
            </div>
            <div class="col mb-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" name="dateOfBirth" class="form-control"
                       th:value="${profile.dateOfBirth}"/>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Expiry Date</label>
            <input type="date" name="expiryDate" class="form-control"
                   th:value="${profile.expiryDate}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Profile Type *</label>
            <select name="type" class="form-select" required>
                <option th:each="t : ${profileTypes}" th:value="${t}" th:text="${t}"
                        th:selected="${profile.type == t}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Barcode Type</label>
            <select name="barcodeType" class="form-select">
                <option th:each="b : ${barcodeTypes}" th:value="${b}" th:text="${b}"
                        th:selected="${profile.barcodeType == b}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Template</label>
            <select name="templateId" class="form-select">
                <option value="">-- No Template --</option>
                <option th:each="t : ${templates}" th:value="${t.id}" th:text="${t.name}"
                        th:selected="${profile.template != null and profile.template.id == t.id}">
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Photo (JPEG/PNG, max 5MB)</label>
            <input type="file" name="photo" class="form-control" accept="image/jpeg,image/png"/>
            <img th:if="${profile.id != null and profile.hasPhoto()}"
                 th:src="@{/profiles/photo/{id}(id=${profile.id})}"
                 height="80" class="mt-2 rounded"/>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/profiles}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
