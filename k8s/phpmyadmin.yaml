apiVersion: v1
kind: Service
metadata:
  name: idcard-mysql-service
spec:
  selector:
    app: idcard
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Pod
metadata:
  name: phpmyadmin-pod
  labels:
    app: phpmyadmin
spec:
  containers:
    - name: phpmyadmin
      image: phpmyadmin/phpmyadmin:latest
      ports:
        - containerPort: 80
      env:
        - name: PMA_HOST
          value: idcard-mysql-service
        - name: PMA_PORT
          value: "3306"
        - name: PMA_USER
          value: root
        - name: PMA_PASSWORD
          value: Hello@123
        - name: UPLOAD_LIMIT
          value: 64M
---
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin-service
spec:
  type: NodePort
  selector:
    app: phpmyadmin
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30081