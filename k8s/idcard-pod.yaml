apiVersion: v1
kind: Pod
metadata:
  name: idcard-pod
  labels:
    app: idcard
spec:
  containers:
    - name: web
      image: ubuntu:24.04
      ports:
        - containerPort: 8080
        - containerPort: 22
      env:
        - name: MYSQL_HOST
          value: "127.0.0.1"
        - name: MYSQL_PORT
          value: "3306"
        - name: MYSQL_DATABASE
          value: "A-SOPHAT_ODOM-db"
        - name: MYSQL_USER
          value: "root"
        - name: MYSQL_PASSWORD
          value: "Hello@123"
      command:
        - /bin/bash
        - -c
        - |
          set -e

          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            openjdk-21-jdk \
            git \
            maven \
            nginx \
            php-cli \
            openssh-server \
            curl \
            default-mysql-client

          mkdir -p /run/sshd

          echo 'root:Hello@123' | chpasswd
          sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config

          cd /opt
          git clone https://github.com/KingChocoLate/final-exam_devops.git app
          cd app

          cat > src/main/resources/application.properties <<EOF
          spring.application.name=idcard

          spring.datasource.url=jdbc:mysql://127.0.0.1:3306/A-SOPHAT_ODOM-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          spring.datasource.username=root
          spring.datasource.password=Hello@123
          spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.show-sql=true

          spring.servlet.multipart.max-file-size=5MB
          spring.servlet.multipart.max-request-size=5MB

          app.photo-dir=uploads/photos

          server.port=8081
          EOF

          nohup mvn spring-boot:run > /tmp/springboot.log 2>&1 &

          cat > /etc/nginx/sites-available/default <<EOF
          server {
              listen 8080 default_server;
              listen [::]:8080 default_server;

              location / {
                  proxy_pass http://127.0.0.1:8081;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          EOF

          service ssh start
          nginx -g "daemon off;"

    - name: mysql
      image: mysql:8.4
      ports:
        - containerPort: 3306
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: "Hello@123"
        - name: MYSQL_DATABASE
          value: "A-SOPHAT_ODOM-db"
---
apiVersion: v1
kind: Service
metadata:
  name: idcard-service
spec:
  type: NodePort
  selector:
    app: idcard
  ports:
    - name: website
      port: 8443
      targetPort: 8080
      nodePort: 30443
    - name: ssh
      port: 2222
      targetPort: 22
      nodePort: 30222