services:
  mysql:
    image: mysql:8.4
    container_name: idcard_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: idcard_db
      MYSQL_USER: idcard_user
      MYSQL_PASSWORD: idcard123
    ports:
      - "3307:3306"
    volumes:
      - idcard_mysql_data:/var/lib/mysql

volumes:
  idcard_mysql_data: